# Example configuration demonstrating night mode features
# Copy this to ~/.config/deadlocked/configs/night_mode_example.toml

[night_mode]
enabled = true
auto_switch = true
start_time = "20:00"  # 8 PM
end_time = "06:00"    # 6 AM
day_accent_style = "Default"
night_accent_style = "NightBlue"
reduce_blue_light = true
blue_light_intensity = 0.4

# Game brightness modification (modifies actual game brightness)
game_brightness_enabled = true
night_brightness = 0.6      # Darker at night (0.1-2.0, 1.0 = normal)
day_brightness = 1.0        # Normal during day
brightness_transition_time = 5  # Seconds for smooth transition

# You can also try other night themes:
# night_accent_style = "NightAmber"  # Warm amber tones
# night_accent_style = "NightGray"   # Pure grayscale
# night_accent_style = "NightTerminal"  # Dark green terminal style

# Brightness settings for different scenarios:
# For very dark nights: night_brightness = 0.4
# For slightly darker: night_brightness = 0.7
# For brighter nights: night_brightness = 1.2

[aim]
# Your aim settings here...

[player]
# Your player settings here...

[hud]
# Your HUD settings here...

[misc]
# Your misc settings here...

accent_style = "Default"  # This will be overridden by night mode when enabled
